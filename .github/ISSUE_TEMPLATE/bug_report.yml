name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: See Admin → About.
      placeholder: e.g. 0.6.22
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.1 (Apple Silicon)
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, console output, etc. Do not paste private financial data.
