name: Stale

# Closes stale issues and pull requests after a quiet period so the queue stays
# meaningful. Runs daily; can also be triggered manually.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,roadmap,security,bug,enhancement"
          exempt-pr-labels: "pinned,security"
          stale-issue-message: |
            This issue has been quiet for a while. If it's still relevant, drop
            a note and we'll keep it open — otherwise it'll be closed in two
            weeks.
          stale-pr-message: |
            This PR has been quiet for a while. If it's still relevant, drop a
            note — otherwise it'll be closed in two weeks.
          close-issue-message: |
            Closing as stale. Reopen any time with fresh context.
          close-pr-message: |
            Closing as stale. Reopen any time with fresh context.
